name: Manual: Seed release docs
run-name: Seed docs for ${{ inputs.version_tag }} → acoular/${{ inputs.version_tag }}
permissions:
  contents: read
on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Git tag to build and archive (e.g. v26.01)"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.version_tag }}

      - name: Detect build environment
        id: env
        run: |
          if [ -f .python-version ]; then
            PYTHON=$(cat .python-version)
          else
            PYTHON=$(grep 'requires-python' pyproject.toml | grep -oP '\d+\.\d+' | head -1)
            PYTHON=${PYTHON:-3.10}
          fi
          echo "python=${PYTHON}" >> $GITHUB_OUTPUT

          if [ -f uv.lock ]; then
            echo "frozen=--frozen --exact" >> $GITHUB_OUTPUT
          else
            echo "frozen=" >> $GITHUB_OUTPUT
          fi

          if grep -q '\[dependency-groups\]' pyproject.toml; then
            echo "docs-flag=--group docs" >> $GITHUB_OUTPUT
          else
            echo "docs-flag=--extra docs" >> $GITHUB_OUTPUT
          fi

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ steps.env.outputs.python }}

      - name: Set up Pandoc
        uses: acoular/ci/.github/actions/setup-pandoc@main
        with:
          os: ubuntu-latest

      - name: Set up PortAudio
        uses: acoular/ci/.github/actions/setup-portaudio@main
        with:
          os: ubuntu-latest

      - name: Set up Graphviz
        uses: acoular/ci/.github/actions/setup-graphviz@main
        with:
          os: ubuntu-latest

      - name: Build docs
        env:
          DOCS_BASEURL: "https://acoular.org/acoular/${{ inputs.version_tag }}/"
          DOCS_SWITCHER_JSON_URL: "https://acoular.org/acoular/_static/switcher.json"
        run: uv run ${{ steps.env.outputs.frozen }} ${{ steps.env.outputs.docs-flag }} make -C docs html

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: build-docs-${{ inputs.version_tag }}
          path: ./docs/build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: build-docs-${{ inputs.version_tag }}
          path: ./docs/build/html

      - name: Generate switcher.json
        uses: acoular/ci/.github/actions/generate-switcher@main
        with:
          package-path: /acoular
          min-version: v26.01
          output: docs/build/html/_static/switcher.json

      - name: Prepare package-root switcher payload
        run: |
          mkdir -p switcher
          cp docs/build/html/_static/switcher.json switcher/switcher.json

      - name: Deploy versioned docs to website gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          external_repository: acoular/website
          publish_branch: gh-pages
          personal_token: ${{ secrets.WEBSITE_GH_PAGES_TOKEN }}
          publish_dir: ./docs/build/html
          destination_dir: acoular/${{ inputs.version_tag }}
          keep_files: true
          enable_jekyll: false

      - name: Deploy package-root switcher
        uses: peaceiris/actions-gh-pages@v4
        with:
          external_repository: acoular/website
          publish_branch: gh-pages
          personal_token: ${{ secrets.WEBSITE_GH_PAGES_TOKEN }}
          publish_dir: ./switcher
          destination_dir: acoular/_static
          keep_files: true
          enable_jekyll: false
