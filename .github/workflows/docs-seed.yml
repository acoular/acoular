name: "Manual: Seed release docs"
run-name: Seed docs for ${{ inputs.version_tag }} → acoular/${{ inputs.version_tag }}
permissions:
  contents: read
on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Git tag to build and archive (e.g. v26.01)"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.version_tag }}

      - name: Detect build environment
        id: env
        run: |
          if [ -f .python-version ]; then
            PYTHON=$(cat .python-version)
          else
            PYTHON=$(grep 'requires-python' pyproject.toml | grep -oP '\d+\.\d+' | head -1)
            PYTHON=${PYTHON:-3.10}
          fi
          echo "python=${PYTHON}" >> $GITHUB_OUTPUT

          if [ -f uv.lock ]; then
            echo "frozen=--frozen --exact" >> $GITHUB_OUTPUT
          else
            echo "frozen=" >> $GITHUB_OUTPUT
          fi

          if grep -q '\[dependency-groups\]' pyproject.toml; then
            echo "docs-flag=--group docs" >> $GITHUB_OUTPUT
          else
            echo "docs-flag=--extra docs" >> $GITHUB_OUTPUT
          fi

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ steps.env.outputs.python }}

      - name: Set up Pandoc
        uses: acoular/ci/.github/actions/setup-pandoc@main
        with:
          os: ubuntu-latest

      - name: Set up PortAudio
        uses: acoular/ci/.github/actions/setup-portaudio@main
        with:
          os: ubuntu-latest

      - name: Set up Graphviz
        uses: acoular/ci/.github/actions/setup-graphviz@main
        with:
          os: ubuntu-latest

      - name: Build docs
        env:
          DOCS_BASEURL: "https://acoular.org/acoular/${{ inputs.version_tag }}/"
          DOCS_SWITCHER_JSON_URL: "https://acoular.org/acoular/_static/switcher.json"
        run: uv run ${{ steps.env.outputs.frozen }} ${{ steps.env.outputs.docs-flag }} make -C docs html

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: build-docs-${{ inputs.version_tag }}
          path: ./docs/build/html

  deploy:
    needs: build
    uses: acoular/ci/.github/workflows/package-docs-deploy.yml@main
    with:
      artifact_name: build-docs-${{ inputs.version_tag }}
      artifact_path: ./docs/build/html
      destination_dir: acoular/${{ inputs.version_tag }}
      package_path: /acoular
      min_version: v26.01
      deploy_switcher: true
      switcher_destination_dir: acoular/_static
    secrets:
      website_gh_pages_token: ${{ secrets.WEBSITE_GH_PAGES_TOKEN }}
